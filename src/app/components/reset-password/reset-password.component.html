<div
  class="min-h-[90vh] flex items-center justify-center px-4 py-12 font-sans bg-gray-50/50"
>
  <div
    class="max-w-md w-full bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-gray-100 p-8 sm:p-10 relative overflow-hidden"
  >
    <div
      class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-50 rounded-full blur-3xl opacity-60"
    ></div>

    <div class="relative z-10 text-center mb-8">
      <div
        class="mx-auto w-16 h-16 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-center justify-center text-[#4f46e5] mb-5 shadow-sm rotate-3"
      >
        <i class="pi pi-shield text-2xl -rotate-3"></i>
      </div>
      <h2
        class="text-2xl sm:text-3xl font-black text-gray-900 tracking-tight mb-2"
      >
        Create New Password
      </h2>
      <p class="text-xs text-gray-400 font-medium uppercase tracking-widest">
        Secure your TechSouq account
      </p>
    </div>

    <form
      [formGroup]="resetForm"
      (ngSubmit)="onSubmit()"
      class="relative z-10 space-y-5"
    >
      <div class="space-y-1.5">
        <label class="block text-sm font-bold text-gray-700 ml-1"
          >New Password</label
        >
        <div class="relative group">
          <div
            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#4f46e5] transition-colors"
          >
            <i class="pi pi-lock"></i>
          </div>
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="Min. 8 characters"
            class="w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-[#4f46e5] outline-none transition-all"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
          >
            <i
              class="pi"
              [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"
            ></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-3 px-1">
          <div
            class="flex items-center gap-1.5 text-[10px] font-bold transition-all"
            [ngClass]="
              resetForm.get('newPassword')?.hasError('required') ||
              resetForm.get('newPassword')?.hasError('minlength')
                ? 'text-gray-400'
                : 'text-emerald-500'
            "
          >
            <i
              class="pi"
              [ngClass]="
                resetForm.get('newPassword')?.hasError('required') ||
                resetForm.get('newPassword')?.hasError('minlength')
                  ? 'pi-circle'
                  : 'pi-check-circle'
              "
            ></i>
            8+ Characters
          </div>
          <div
            class="flex items-center gap-1.5 text-[10px] font-bold transition-all"
            [ngClass]="
              resetForm.get('newPassword')?.hasError('pattern')
                ? 'text-gray-400'
                : 'text-emerald-500'
            "
          >
            <i
              class="pi"
              [ngClass]="
                resetForm.get('newPassword')?.hasError('pattern')
                  ? 'pi-circle'
                  : 'pi-check-circle'
              "
            ></i>
            Upper, Lower, Symbol
          </div>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-bold text-gray-700 ml-1"
          >Confirm Password</label
        >
        <div class="relative group">
          <div
            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#4f46e5] transition-colors"
          >
            <i class="pi pi-verified"></i>
          </div>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Repeat your password"
            class="w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-[#4f46e5] outline-none transition-all"
            [ngClass]="{
              'border-red-400':
                resetForm.get('confirmPassword')?.touched &&
                resetForm.hasError('passwordMismatch'),
            }"
          />
          <button
            type="button"
            (click)="toggleConfirmPassword()"
            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
          >
            <i
              class="pi"
              [ngClass]="showConfirmPassword ? 'pi-eye-slash' : 'pi-eye'"
            ></i>
          </button>
        </div>

        @if (
          resetForm.get("confirmPassword")?.touched &&
          resetForm.hasError("passwordMismatch")
        ) {
          <p
            class="text-red-500 text-[10px] font-bold ml-1 flex items-center gap-1 mt-1"
          >
            <i class="pi pi-exclamation-triangle"></i> Passwords do not match.
          </p>
        }
      </div>

      <button
        type="submit"
        [disabled]="resetForm.invalid || isLoading"
        class="w-full bg-[#4f46e5] hover:bg-[#4338ca] text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-indigo-500/20 active:scale-[0.98] flex items-center justify-center gap-2 disabled:bg-gray-200 disabled:shadow-none disabled:text-gray-400 disabled:cursor-not-allowed"
      >
        @if (isLoading) {
          <i class="pi pi-spinner animate-spin"></i> Updating Password...
        } @else {
          <i class="pi pi-check"></i> Reset Password
        }
      </button>
    </form>

    <div class="relative z-10 mt-8 text-center pt-6 border-t border-gray-50">
      <a
        routerLink="/Login"
        class="text-sm font-bold text-gray-400 hover:text-[#4f46e5] transition-colors inline-flex items-center gap-2"
      >
        <i class="pi pi-arrow-left text-[10px]"></i> Back to Sign In
      </a>
    </div>
  </div>
</div>
