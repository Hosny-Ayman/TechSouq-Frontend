<div class="card shadow-sm">
  <p-menubar [model]="items" class="border-none">
    <ng-template pTemplate="start">
      <a
        class="text-2xl font-extrabold text-[#c7511f] ml-4 tracking-wide"
        routerLink="/Auth"
      >
        TechSouq
      </a>
    </ng-template>

    <ng-template pTemplate="end">
      <div
        class="relative flex items-center justify-end gap-5 mr-4 w-full sm:w-[350px] md:w-[450px] lg:w-[550px]"
      >
        <div class="relative w-full">
          <i
            class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg z-10"
          ></i>
          <input
            type="text"
            [(ngModel)]="searchWord"
            (keyup.enter)="onSearch()"
            (input)="onInputClear()"
            pInputText
            placeholder="What are you looking for..."
            class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-[#ffa41c] focus:border-transparent focus:bg-white transition-all duration-300 placeholder-gray-400"
          />
        </div>

        <a
          routerLink="/Cart"
          class="relative cursor-pointer group flex items-center mt-1"
        >
          <i
            class="pi pi-shopping-cart text-2xl text-gray-700 group-hover:text-black transition-colors"
          ></i>

          @if (cartCount > 0) {
            <span
              class="absolute -top-2 -right-3 bg-[#ffa41c] text-white text-[11px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-md animate-bounce-short"
            >
              {{ cartCount }}
            </span>
          }
        </a>

        <div class="relative group mt-1">
          <button
            class="w-9 h-9 rounded-full bg-[#db4444] text-white flex items-center justify-center hover:bg-red-600 transition-all duration-300 shadow-md focus:outline-none focus:ring-2 focus:ring-red-300 focus:ring-offset-2"
          >
            <i class="pi pi-user text-lg"></i>
          </button>

          <div
            class="absolute right-0 top-full mt-3 w-56 rounded-xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 overflow-hidden transform origin-top-right group-hover:scale-100 scale-95"
            style="background: linear-gradient(145deg, #2b2b2b, #1a1a1a)"
          >
            <ul
              class="flex flex-col text-gray-100 font-medium text-[14px] py-2"
            >
              <li>
                <a
                  routerLink="/User/Profile"
                  class="flex items-center gap-3 px-5 py-3 hover:bg-white/10 hover:pl-6 transition-all duration-300 cursor-pointer"
                >
                  <i class="pi pi-user text-xl font-light"></i>
                  <span>Manage My Account</span>
                </a>
              </li>

              <li>
                <a
                  routerLink="/User/Order"
                  class="flex items-center gap-3 px-5 py-3 hover:bg-white/10 hover:pl-6 transition-all duration-300 cursor-pointer"
                >
                  <i class="pi pi-box text-xl font-light"></i>
                  <span>My Orders</span>
                </a>
              </li>

              <div class="h-px bg-gray-700 my-1 mx-4"></div>

              <li>
                <a
                  (click)="logout()"
                  class="flex items-center gap-3 px-5 py-3 hover:bg-red-500/20 text-gray-100 hover:text-red-400 hover:pl-6 transition-all duration-300 cursor-pointer"
                >
                  <i class="pi pi-sign-out text-xl font-light"></i>
                  <span>Logout</span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </ng-template>
  </p-menubar>
</div>
