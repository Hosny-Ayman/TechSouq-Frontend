<div class="card shadow-sm">
  <p-menubar [model]="items" class="border-none">
    <ng-template pTemplate="start">
      <a
        class="text-2xl font-extrabold text-[#c7511f] ml-4 tracking-wide"
        routerLink="/Auth"
      >
        TechSouq
      </a>
    </ng-template>

    <ng-template pTemplate="end">
      <div
        class="relative flex items-center justify-end gap-3 mr-4 w-full sm:w-[350px] md:w-[450px] lg:w-[550px]"
      >
        <div class="relative w-full">
          <i
            class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg z-10"
          ></i>
          <input
            type="text"
            [(ngModel)]="searchWord"
            (keyup.enter)="onSearch()"
            pInputText
            placeholder="What are you looking for..."
            class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-800 text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-[#ffa41c] focus:border-transparent focus:bg-white transition-all duration-300 placeholder-gray-400"
          />
        </div>

        <button
          (click)="logout()"
          class="flex items-center justify-center gap-2 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-5 py-2.5 rounded-full font-medium transition-colors duration-300 border border-red-100 whitespace-nowrap shadow-sm group"
          title="Logout"
        >
          <i
            class="pi pi-sign-out text-lg transition-transform group-hover:-translate-x-1"
          ></i>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </ng-template>
  </p-menubar>
</div>
