<div class="payment-container">
  <h2>الدفع الآمن</h2>

  <div class="form-group">
    <label>رقم البطاقة</label>
    <div id="card-number-element" class="stripe-card-box"></div>
  </div>

  <div class="split-group">
    <div class="form-group">
      <label>تاريخ الانتهاء</label>
      <div id="card-expiry-element" class="stripe-card-box"></div>
    </div>

    <div class="form-group">
      <label>الرقم السري (CVC)</label>
      <div id="card-cvc-element" class="stripe-card-box"></div>
    </div>
  </div>

  <button (click)="pay()" [disabled]="!stripeReady">ادفع الآن</button>

  @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
  }
</div>
